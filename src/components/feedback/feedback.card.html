<!-- @dsCard group="Components" viewport="700x900" name="Feedback" subtitle="Progress, Skeleton, Alert, Toast, Tooltip, Dialog, EmptyState, Popover, CommandPalette" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="../../_theme-toggle.js"></script>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
<style>
  html,body{margin:0}
  body{font-family:var(--font-ui);color:var(--text);
    background:radial-gradient(120% 80% at 0% -10%,var(--accent-light),transparent 55%),var(--bg);padding:24px}
  .wrap{display:flex;flex-direction:column;gap:16px;max-width:652px}
  .eyebrow{font-size:var(--text-mini);font-weight:700;letter-spacing:var(--tracking-wide);text-transform:uppercase;color:var(--text-muted);margin:0 0 8px}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;display:flex;flex-direction:column;gap:10px}
  .row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
</style>
</head>
<body>
<div class="wrap" id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Progress, Skeleton, Alert, Toast, Tooltip, Button, EmptyState, Popover, IconButton, Switch,
          CommandPalette, Drawer, Banner, ProgressCircle, LoadingOverlay, Card } = window.AgusDesignSystem_492a6f;

  const CMDS = [
    { id:'new', label:'New project', group:'Projects', icon:<i className="ph ph-plus" />, shortcut:['⌘','N'], onSelect:()=>{} },
    { id:'open', label:'Open project', group:'Projects', icon:<i className="ph ph-folder-open" />, onSelect:()=>{} },
    { id:'dark', label:'Toggle dark mode', group:'Settings', icon:<i className="ph ph-moon" />, shortcut:['⌘','D'], onSelect:()=>{} },
    { id:'help', label:'Help & docs', group:'Settings', icon:<i className="ph ph-question" />, onSelect:()=>{} },
  ];

  function Demo() {
    return (
      <div className="wrap">
        {/* Progress */}
        <div className="panel">
          <p className="eyebrow">Progress</p>
          <Progress value={72} label="Upload" showValue />
          <Progress value={38} tone="warning" showValue />
          <Progress value={100} tone="success" showValue />
        </div>

        {/* Skeleton */}
        <div className="panel">
          <p className="eyebrow">Skeleton</p>
          <div className="row">
            <Skeleton circle height={44} />
            <div style={{flex:1,display:'flex',flexDirection:'column',gap:6}}>
              <Skeleton width="70%" height={14} />
              <Skeleton width="90%" height={12} />
              <Skeleton width="50%" height={12} />
            </div>
          </div>
        </div>

        {/* Alerts */}
        <div className="panel">
          <p className="eyebrow">Alert</p>
          <Alert tone="accent" title="Info">Liquid bubble replaces the accent-left border trope.</Alert>
          <Alert tone="success" title="Deployed" onClose={()=>{}}>v2.4 is live on production.</Alert>
          <Alert tone="warning" title="Heads up">Font CDN fallback active — upload local files.</Alert>
          <Alert tone="danger" title="Error" onClose={()=>{}}>Build failed at compilation step.</Alert>
        </div>

        {/* Toast */}
        <div className="panel">
          <p className="eyebrow">Toast</p>
          <div className="row">
            <Toast message="Changes saved" tone="success" />
            <Toast message="Connection lost" tone="danger" />
          </div>
        </div>

        {/* EmptyState */}
        <div>
          <p className="eyebrow">EmptyState · large liquid blob background</p>
          <EmptyState
            title="No projects yet"
            description="Create your first project to get started with the Aqus studio."
            icon={<i className="ph ph-folder-open" />}
            action={<Button variant="primary" size="sm" icon={<i className="ph ph-plus" style={{fontSize:14}}/>}>New project</Button>}
            style={{minHeight:200}}
          />
        </div>

        {/* Popover */}
        <div className="panel">
          <p className="eyebrow">Popover · click-toggled glass panel</p>
          <div className="row">
            <Popover trigger={<Button variant="secondary" size="sm">Preferences <i className="ph ph-caret-down" style={{fontSize:12,marginLeft:4}}/></Button>}>
              <div style={{display:'flex',flexDirection:'column',gap:12,minWidth:180}}>
                <div style={{fontWeight:600,fontSize:13,color:'var(--text)'}}>Display</div>
                <Switch checked={true} onChange={()=>{}} label="Dark mode" style={{fontSize:13}} />
                <Switch checked={false} onChange={()=>{}} label="Compact view" style={{fontSize:13}} />
              </div>
            </Popover>
            <Tooltip content="More actions">
              <IconButton label="More" variant="soft">
                <i className="ph ph-dots-three" style={{fontSize:18}} />
              </IconButton>
            </Tooltip>
          </div>
        </div>

        {/* Banner */}
        <div className="panel">
          <p className="eyebrow">Banner · page-level announcement bar</p>
          <div style={{display:'flex',flexDirection:'column',gap:8,borderRadius:'var(--radius-sm)',overflow:'hidden'}}>
            <Banner tone="accent" icon={<i className="ph ph-sparkle" style={{fontSize:16}}/>} action={<a href="#" style={{color:'inherit',textDecoration:'underline',fontSize:13}}>Learn more</a>}>New: liquid identity v2 is live</Banner>
            <Banner tone="warning" onClose={()=>{}}>Your trial ends in 3 days.</Banner>
            <Banner tone="danger" onClose={()=>{}}>Payment failed — update your card to continue.</Banner>
          </div>
        </div>

        {/* ProgressCircle */}
        <div className="panel">
          <p className="eyebrow">ProgressCircle · circular determinate ring</p>
          <div className="row">
            <ProgressCircle value={72} size={72} />
            <ProgressCircle value={100} tone="success" size={56} />
            <ProgressCircle value={38} tone="warning" size={56} label="used" />
            <ProgressCircle value={64} size={56} showValue={false} morph />
            <ProgressCircle value={17} tone="danger" size={48} />
          </div>
        </div>

        {/* LoadingOverlay */}
        <div className="panel">
          <p className="eyebrow">LoadingOverlay · dimmed surface cover</p>
          <Card style={{position:'relative',minHeight:80,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <span style={{color:'var(--text-muted)',fontSize:'var(--text-body-sm)'}}>Card content</span>
            <LoadingOverlay show message="Saving changes…" />
          </Card>
        </div>
        <div className="panel">
          <p className="eyebrow">CommandPalette · ⌘K glass overlay, liquid active item</p>
          <div className="row" style={{alignItems:'center',gap:16}}>
            <CmdDemo commands={CMDS} />
            <span style={{fontSize:'var(--text-caption)',color:'var(--text-muted)'}}>Glass overlay · keyboard nav · liquid active bubble</span>
          </div>
        </div>
        {/* Drawer */}
        <div className="panel">
          <p className="eyebrow">Drawer · slide-in glass panel</p>
          <div className="row"><DrawerDemo /></div>
        </div>
      </div>
    );
  }

  function DrawerDemo() {
    const [open, setOpen] = React.useState(false);
    return (
      <>
        <Button variant="secondary" size="sm" icon={<i className="ph ph-sidebar-simple" style={{fontSize:14}}/>} onClick={() => setOpen(true)}>Open drawer</Button>
        <Drawer open={open} onClose={() => setOpen(false)} side="right" title="Filters">
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <Switch checked={true} onChange={()=>{}} label="Active only" />
            <Switch checked={false} onChange={()=>{}} label="Archived" />
            <Button variant="primary" onClick={() => setOpen(false)}>Apply</Button>
          </div>
        </Drawer>
      </>
    );
  }

  function CmdDemo({ commands }) {
    const [open, setOpen] = React.useState(false);
    return (
      <>
        <Button variant="secondary" size="sm"
          icon={<i className="ph ph-magnifying-glass" style={{fontSize:14}}/>}
          onClick={() => setOpen(true)}>
          Open palette
          <kbd style={{fontFamily:'var(--font-mono)',fontSize:11,background:'var(--surface)',border:'1px solid var(--border)',borderBottomWidth:2,borderRadius:'var(--radius-xs)',padding:'2px 5px',marginLeft:6}}>⌘K</kbd>
        </Button>
        <CommandPalette open={open} onClose={() => setOpen(false)} commands={commands} />
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
