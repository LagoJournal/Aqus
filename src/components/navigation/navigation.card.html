<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="../../_theme-toggle.js"></script>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
<style>
  html,body{margin:0}
  body{font-family:var(--font-ui);color:var(--text);
    background:radial-gradient(120% 80% at 100% -10%,var(--accent-light),transparent 55%),var(--bg);padding:24px}
  .wrap{display:flex;flex-direction:column;gap:20px;max-width:652px}
  .eyebrow{font-size:var(--text-mini);font-weight:700;letter-spacing:var(--tracking-wide);text-transform:uppercase;color:var(--text-muted);margin:0 0 10px}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px}
  .row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
</style>
</head>
<body>
<div class="wrap" id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Tabs, Breadcrumb, Menu, Accordion, Pagination, Stepper, ContextMenu, Card } = window.AgusDesignSystem_492a6f;

  function Demo() {
    const [page, setPage] = React.useState(3);
    return (
      <div className="wrap">
        {/* Tabs */}
        <div className="panel">
          <p className="eyebrow">Tabs</p>
          <Tabs tabs={[
            {id:'overview',label:'Overview'},
            {id:'projects',label:'Projects'},
            {id:'activity',label:'Activity'},
            {id:'settings',label:'Settings'},
          ]} defaultTab="overview" />
        </div>

        {/* Breadcrumb */}
        <div className="panel">
          <p className="eyebrow">Breadcrumb</p>
          <Breadcrumb items={[
            {label:'Home',href:'#'},
            {label:'Projects',href:'#'},
            {label:'Aero Mail'},
          ]} />
        </div>

        {/* Accordion */}
        <div className="panel">
          <p className="eyebrow">Accordion · liquid bubble expand indicator</p>
          <Accordion items={[
            {id:'a',title:'What is the liquid identity?',content:'A slowly-morphing organic blob shape derived from the Sony Ericsson Ingredient brand — used wherever a perfect circle would appear.'},
            {id:'b',title:'How does the accent system work?',content:'One accent per project, set manually. Override the 9 --accent-* tokens in your :root {} block. The derivation formula and constraints are in tokens/ACCENT.md.'},
            {id:'c',title:'Which icon library is used?',content:'Phosphor icons (regular weight, CDN). App/feature icons are Aqua-style illustrative, authored per-asset.'},
          ]} defaultOpen={['a']} />
        </div>

        {/* Pagination */}
        <div className="panel">
          <p className="eyebrow">Pagination · active page = filled liquid blob</p>
          <Pagination page={page} total={12} onChange={setPage} />
        </div>

        {/* Stepper */}
        <div className="panel">
          <p className="eyebrow">Stepper · liquid bubble step nodes</p>
          <Stepper current={1} steps={[
            {label:'Account',description:'Your details'},
            {label:'Payment',description:'Billing info'},
            {label:'Confirm'},
          ]} />
        </div>

        {/* ContextMenu */}
        <div className="panel">
          <p className="eyebrow">ContextMenu · right-click the card</p>
          <ContextMenu items={[
            {label:'Open',icon:<i className="ph ph-arrow-square-out" />,shortcut:'⌘O',onSelect:()=>{}},
            {label:'Rename',icon:<i className="ph ph-pencil-simple" />,onSelect:()=>{}},
            {divider:true},
            {label:'Delete',icon:<i className="ph ph-trash" />,tone:'danger',onSelect:()=>{}},
          ]}>
            <Card style={{textAlign:'center',padding:18,cursor:'context-menu'}}>Right-click me</Card>
          </ContextMenu>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
